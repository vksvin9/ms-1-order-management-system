server:
  port: 8084

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:h2:file:${user.home}/h2/authdb;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: false