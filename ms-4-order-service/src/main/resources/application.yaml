server:
  port: 8083

spring:
  application:
    name: ms-4-order-service

  datasource:
    url: jdbc:h2:file:${user.home}/h2/orderdb;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

inventory:
  service:
    base-url: http://localhost:8082