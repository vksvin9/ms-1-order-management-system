services:

  # ==========================================
  # ZIPKIN
  # ==========================================
  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - order-network

  # ==========================================
  # PROMETHEUS
  # ==========================================
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - order-network

  # ==========================================
  # GRAFANA
  # ==========================================
  grafana:
    image: grafana/grafana-oss
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    networks:
      - order-network

  # ==========================================
  # CONFIG SERVER
  # ==========================================
  config-server:
    image: config-server:1.0
    container_name: config-server
    ports:
      - "8888:8888"
    networks:
      - order-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8888/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  # ==========================================
  # DISCOVERY SERVER
  # ==========================================
  discovery-server:
    image: discovery-server:1.0
    container_name: discovery-server
    ports:
      - "8761:8761"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - order-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ==========================================
  # AUTH SERVICE
  # ==========================================
  auth-service:
    image: auth-service:1.0
    container_name: auth-service
    ports:
      - "8084:8084"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER: ${DB_DRIVER}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL}
      H2_CONSOLE_ENABLED: ${H2_CONSOLE_ENABLED}
      ZIPKIN_URL: ${ZIPKIN_URL}
      TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
      MANAGEMENT_ENDPOINTS: ${MANAGEMENT_ENDPOINTS}
      HEALTH_SHOW_DETAILS: ${HEALTH_SHOW_DETAILS}
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT}
      AUTH_DB_URL: ${AUTH_DB_URL}
    depends_on:
      discovery-server:
        condition: service_healthy
    volumes:
      - auth-data:/data/h2
    networks:
      - order-network

  # ==========================================
  # PRODUCT SERVICE
  # ==========================================
  product-service:
    image: product-service:1.0
    container_name: product-service
    ports:
      - "8081:8081"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER: ${DB_DRIVER}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL}
      H2_CONSOLE_ENABLED: ${H2_CONSOLE_ENABLED}
      ZIPKIN_URL: ${ZIPKIN_URL}
      TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
      MANAGEMENT_ENDPOINTS: ${MANAGEMENT_ENDPOINTS}
      HEALTH_SHOW_DETAILS: ${HEALTH_SHOW_DETAILS}
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT}
      PRODUCT_DB_URL: ${PRODUCT_DB_URL}
    depends_on:
      discovery-server:
        condition: service_healthy
    volumes:
      - product-data:/data/h2
    networks:
      - order-network

  # ==========================================
  # INVENTORY SERVICE
  # ==========================================
  inventory-service:
    image: inventory-service:1.0
    container_name: inventory-service
    ports:
      - "8082:8082"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER: ${DB_DRIVER}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL}
      H2_CONSOLE_ENABLED: ${H2_CONSOLE_ENABLED}
      ZIPKIN_URL: ${ZIPKIN_URL}
      TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
      MANAGEMENT_ENDPOINTS: ${MANAGEMENT_ENDPOINTS}
      HEALTH_SHOW_DETAILS: ${HEALTH_SHOW_DETAILS}
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT}
      INVENTORY_DB_URL: ${INVENTORY_DB_URL}
    depends_on:
      discovery-server:
        condition: service_healthy
    volumes:
      - inventory-data:/data/h2
    networks:
      - order-network

  # ==========================================
  # ORDER SERVICE
  # ==========================================
  order-service:
    image: order-service:1.0
    container_name: order-service
    ports:
      - "8083:8083"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER: ${DB_DRIVER}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL}
      H2_CONSOLE_ENABLED: ${H2_CONSOLE_ENABLED}
      ZIPKIN_URL: ${ZIPKIN_URL}
      TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
      MANAGEMENT_ENDPOINTS: ${MANAGEMENT_ENDPOINTS}
      HEALTH_SHOW_DETAILS: ${HEALTH_SHOW_DETAILS}
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT}
      ORDER_DB_URL: ${ORDER_DB_URL}
      INVENTORY_SERVICE_URL: ${INVENTORY_SERVICE_URL}
    depends_on:
      discovery-server:
        condition: service_healthy
    volumes:
      - order-data:/data/h2
    networks:
      - order-network

  # ==========================================
  # NOTIFICATION SERVICE
  # ==========================================
  notification-service:
    image: notification-service:1.0
    container_name: notification-service
    ports:
      - "8085:8085"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      ZIPKIN_URL: ${ZIPKIN_URL}
      TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
      MANAGEMENT_ENDPOINTS: ${MANAGEMENT_ENDPOINTS}
      HEALTH_SHOW_DETAILS: ${HEALTH_SHOW_DETAILS}
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT}
      NOTIFICATION_DB_URL: ${NOTIFICATION_DB_URL}
    depends_on:
      discovery-server:
        condition: service_healthy
    volumes:
      - notification-data:/data/h2
    networks:
      - order-network

  # ==========================================
  # API GATEWAY
  # ==========================================
  api-gateway:
    image: api-gateway:1.0
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      ZIPKIN_URL: ${ZIPKIN_URL}
      TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT}
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - order-network

  # ==========================================
  # REACT FRONTEND
  # ==========================================
  frontend-react:
    image: frontend-react:1.0
    container_name: frontend-react
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    networks:
      - order-network

networks:
  order-network:
    external: true

volumes:
  auth-data:
  product-data:
  inventory-data:
  order-data:
  notification-data: